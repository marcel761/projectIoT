<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengaturan Bel Otomatis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:radial-gradient(circle at top,#042a52,#020b14);
  color:white;
  overflow:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(15,30,60,0.75);
  border-bottom:1px solid rgba(0,255,255,0.2);
  text-shadow:0 0 8px #00eaff;
  box-shadow:0 2px 8px rgba(0,255,255,0.12);
  font-size:20px;
  font-weight:600;
  z-index:20;
}

/* HAMBURGER */
.hamburger{
  position:absolute;
  left:15px;
  width:28px;
  height:22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.hamburger span{
  width:100%;
  height:3px;
  background:#00eaff;
  border-radius:5px;
  box-shadow:0 0 6px #00eaff;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-250px;
  width:230px;
  height:100vh;
  background:rgba(3,17,30,0.95);
  border-right:1px solid rgba(0,255,255,0.25);
  padding-top:70px;
  transition:0.3s;
  z-index:21;
}

.sidebar-title{
  color:#00eaff;
  font-size:16px;
  font-weight:700;
  padding:10px 20px;
  border-bottom:1px solid rgba(0,255,255,0.25);
}

.sidebar a{
  display:block;
  padding:14px 20px;
  color:#00eaff;
  text-decoration:none;
  transition:0.25s;
}

.sidebar a:hover{
  background:rgba(0,255,255,0.1);
  border-left:4px solid #00eaff;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:19;
}

.overlay.active{
  opacity:1;
  visibility:visible;
}

/* MAIN */
main{
  flex:1;
  margin-top:60px;
  margin-bottom:50px;
  padding:15px;
  overflow-y:auto;
}

h2{
  text-align:center;
  font-size:26px;
  text-shadow:0 0 12px #00eaff;
  margin-bottom:10px;
}

.cyber-line{
  width:150px;
  height:3px;
  background:linear-gradient(90deg,transparent,#00eaff,transparent);
  margin:10px auto 20px;
  border-radius:5px;
  box-shadow:0 0 10px #00eaff;
}

/* CARD */
.card{
  background:rgba(0,255,255,0.06);
  border:1px solid rgba(0,255,255,0.25);
  box-shadow:0 0 10px rgba(0,255,255,0.3);
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

/* FORM */
input,
select{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:rgba(10,40,60,0.7);
  border:1px solid #00eaff;
  border-radius:8px;
  color:#00eaff;
  font-weight:600;
}

.btn-add{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00eaff;
  color:#00151e;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 0 15px #00eaff;
  transition:0.25s;
}

.btn-add:hover{
  transform:scale(1.03);
}

/* TABLE */
.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:500px;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(0,255,255,0.2);
  font-size:13px;
}

.btn-del{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
  font-size:12px;
  font-weight:600;
}

.btn-hapus{
  background:#ff1744;
  box-shadow:0 0 8px #ff1744;
}

.btn-edit{
  background:#ffc400;
  color:black;
  box-shadow:0 0 8px #ffc400;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(15,30,60,0.75);
  border-top:1px solid rgba(0,255,255,0.2);
  font-size:12px;
}

.system-title{
  color:#00eaff;
  margin-bottom:12px;
  text-shadow:0 0 8px #00eaff;
}

.status-item{
  margin:8px 0;
  font-size:15px;
  font-weight:500;
}

.system-title{
  color:#00eaff;
  margin-bottom:8px;
  text-shadow:0 0 8px #00eaff;
}

.system-divider{
  width:100%;
  height:2px;
  margin-bottom:12px;
  background:#00eaff;
  box-shadow:
    0 0 5px #00eaff,
    0 0 10px #00eaff,
    0 0 15px #00eaff;
  border-radius:10px;
}

.status-item{
  margin:8px 0;
  font-size:15px;
  font-weight:500;
}

#liveClock {
  color: #00ff66;
  font-weight: 700;
  text-shadow: 0 0 10px #00ff66;
}

</style>
</head>

<body>

<header>
  <div class="hamburger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>
  BEL OTOMATIS
</header>

<div class="sidebar" id="sidebar">
  <div class="sidebar-title">MENU</div>

  <a href="index.html">Beranda</a>
  <a href="dashboard.html">Dashboard</a>
  <a href="lampu.html">Kontrol Lampu</a>
  <a href="bel.html">Jadwal Bel</a>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<main>

<h2>Pengaturan Jadwal Bel</h2>
<div class="cyber-line"></div>

  <div class="card">

  <h3 class="system-title">
    Status System
  </h3>

  <div class="system-divider"></div>

  <div class="status-item">
    Status ESP :
    <span id="espStatus" class="status-offline">
      Tidak Aktif
    </span>
  </div>

  <div class="status-item">
  Jam :
  <span id="liveClock">
    00:00:00
  </span>
</div>

</div>
<!-- FORM -->
<div class="card">

<label>Hari:</label>
<select id="hari">
  <option value="">Pilih Hari</option>
  <option>Senin</option>
  <option>Selasa</option>
  <option>Rabu</option>
  <option>Kamis</option>
  <option>Jumat</option>
  <option>Sabtu</option>
  <option>Minggu</option>
</select>

<label>Tanggal (Opsional):</label>
<input type="date" id="tanggalBel">

<label>Jam Bel:</label>
<input type="time" id="jamBel">

<label>Kegiatan:</label>
<select id="preset">
  <option value="">Pilih Kegiatan</option>
  <option>Masuk</option>
  <option>Pergantian Jam Pelajaran</option>
  <option>Istirahat</option>
  <option>Pulang Sekolah</option>
</select>

<input type="text" id="namaKegiatan" placeholder="Atau ketik sendiri...">

<button class="btn-add" onclick="tambahJadwal()">
  + Tambahkan Jadwal
</button>

</div>

<!-- TABLE -->
<div class="card table-wrap">
<table id="tabelJadwal">
  <tr>
    <th>Hari</th>
    <th>Tanggal</th>
    <th>Jam</th>
    <th>Kegiatan</th>
    <th>Aksi</th>
  </tr>
</table>
</div>

</main>

<footer>
© 2025 Smart IoT Futuristic UI
</footer>

<script>
function toggleMenu() {
  let sidebar = document.getElementById("sidebar");
  let overlay = document.getElementById("overlay");

  if (sidebar.style.left === "0px") {
    sidebar.style.left = "-250px";
    overlay.classList.remove("active");
  } else {
    sidebar.style.left = "0px";
    overlay.classList.add("active");
  }
}

/* DATA */
let jadwalBel = JSON.parse(localStorage.getItem("jadwalBel") || "[]");
let editIndex = -1;

window.onload = tampilkanData;

function tambahJadwal() {

  let hari = document.getElementById("hari").value;
  let tanggal = document.getElementById("tanggalBel").value;
  let jam = document.getElementById("jamBel").value;

  let preset = document.getElementById("preset").value;
  let manual = document.getElementById("namaKegiatan").value;

  let kegiatan = manual !== "" ? manual : preset;

  if(hari === "" || jam === "" || kegiatan === ""){
    alert("Harap isi Hari, Jam, dan Kegiatan!");
    return;
  }

  let data = {
    hari,
    tanggal,
    jam,
    kegiatan
  };

  if(editIndex === -1){
    jadwalBel.push(data);
  } else {
    jadwalBel[editIndex] = data;
    editIndex = -1;
    document.querySelector(".btn-add").innerText =
      "+ Tambahkan Jadwal";
  }

  localStorage.setItem(
  "jadwalBel",
  JSON.stringify(jadwalBel)
);

// kirim ke ESP32 via MQTT
// kirim ke ESP32 via MQTT (UPDATE DATA)
if (mqttClient.connected) {

  let payload = {
    action: "update",
    data: jadwalBel
  };

  mqttClient.publish(
    TOPIC_JADWAL,
    JSON.stringify(payload)
  );
}

  tampilkanData();
  resetForm();

}

function tampilkanData(){

  let tabel = document.getElementById("tabelJadwal");

  tabel.innerHTML = `
    <tr>
      <th>Hari</th>
      <th>Tanggal</th>
      <th>Jam</th>
      <th>Kegiatan</th>
      <th>Aksi</th>
    </tr>
  `;

  jadwalBel.forEach((data,i)=>{

    tabel.innerHTML += `
      <tr>
        <td>${data.hari}</td>
        <td>${data.tanggal || "-"}</td>
        <td>${data.jam}</td>
        <td>${data.kegiatan}</td>

        <td>
          <button class="btn-del btn-hapus"
          onclick="hapusJadwal(${i})">
          Hapus
          </button>

          <button class="btn-del btn-edit"
          onclick="editJadwal(${i})">
          Edit
          </button>
        </td>
      </tr>
    `;
  });
}

function hapusJadwal(index){

  if(confirm("Yakin ingin menghapus jadwal?")){

   jadwalBel.splice(index,1);

// kirim ke ESP32 (DELETE UPDATE)
if (mqttClient.connected) {

  let payload = {
    action: "update",
    data: jadwalBel,
    info: "deleted"
  };

  mqttClient.publish(
    TOPIC_JADWAL,
    JSON.stringify(payload)
  );
}

    localStorage.setItem(
      "jadwalBel",
      JSON.stringify(jadwalBel)
    );

    tampilkanData();

  }
}

function editJadwal(index){

  let data = jadwalBel[index];

  document.getElementById("hari").value = data.hari;
  document.getElementById("tanggalBel").value = data.tanggal;
  document.getElementById("jamBel").value = data.jam;
  document.getElementById("namaKegiatan").value = data.kegiatan;

  document.getElementById("preset").value = "";

  editIndex = index;


  document.querySelector(".btn-add").innerText =
    "✔ Simpan Perubahan";
}

function resetForm(){

  document.getElementById("hari").value = "";
  document.getElementById("tanggalBel").value = "";
  document.getElementById("jamBel").value = "";
  document.getElementById("preset").value = "";
  document.getElementById("namaKegiatan").value = "";
}

function updateClock() {
  const now = new Date();

  const jam = String(now.getHours()).padStart(2, '0');
  const menit = String(now.getMinutes()).padStart(2, '0');
  const detik = String(now.getSeconds()).padStart(2, '0');

  document.getElementById("liveClock").innerText =
    `${jam}:${menit}:${detik}`;
}

setInterval(updateClock, 1000);
updateClock();
</script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>

const TOPIC_JADWAL = "sekolah/bel/jadwal/update";
/* STATUS ESP32 */

const mqttClient = mqtt.connect(
  'wss://broker.hivemq.com:8884/mqtt'
);

const espStatus =
document.getElementById("espStatus");

mqttClient.on("connect", () => {

  console.log("MQTT Connected");

  mqttClient.subscribe(
    "sekolah/bel/status/esp"
  );

  mqttClient.publish(
    "sekolah/bel/status/request",
    "GET_STATUS"
  );

});

let lastUpdate = Date.now();
mqttClient.on("message", (topic, message) => {

  let data = message.toString();

  console.log("STATUS:", topic, data);

  if(topic === "sekolah/bel/status/esp"){

    lastUpdate = Date.now(); // reset timer tiap ada pesan

    if(data === "ONLINE"){
      espStatus.innerHTML = "AKTIF";
      espStatus.style.color = "#00ff66";
      espStatus.style.textShadow = "0 0 10px #00ff66";
    }

    if(data === "OFFLINE"){
      espStatus.innerHTML = "TIDAK AKTIF";
      espStatus.style.color = "red";
      espStatus.style.textShadow = "0 0 10px red";
    }

  }

});

setInterval(() => {

  if(Date.now() - lastUpdate > 5000){ // 8 detik tidak ada update

    espStatus.innerHTML = "TIDAK AKTIF";
    espStatus.style.color = "red";
    espStatus.style.textShadow = "0 0 10px red";
  }

}, 2000);

</script>
</body>
